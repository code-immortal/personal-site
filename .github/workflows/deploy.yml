name: deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Build Docker image
        run: |
          docker build -t ghcr.io/code-immortal/personal-site:latest \
            -t ghcr.io/code-immortal/personal-site:${{ github.sha }} \
            --label "org.opencontainers.image.sha=${{ github.sha }}" .

      - name: Push to GHCR
        run: |
          echo ${{ secrets.PACKAGES_TOKEN }} | docker login ghcr.io \
            -u ${{ github.actor }} --password-stdin
          docker push ghcr.io/code-immortal/personal-site:latest
          docker push ghcr.io/code-immortal/personal-site:${{ github.sha }}

      - name: Deploy
        run: |
          echo ${{ secrets.PACKAGES_TOKEN }} | docker login ghcr.io \
            -u ${{ github.actor }} --password-stdin
          docker service update \
            --image ghcr.io/code-immortal/personal-site:${{ github.sha }} \
            --with-registry-auth \
            personal-site_web 2>/dev/null || \
          docker stack deploy \
            --compose-file deploy/stack.yml \
            --with-registry-auth \
            personal-site
