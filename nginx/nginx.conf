server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── SPA routing ───────────────────────────────────────────────────────────
    # All routes fall back to index.html so the client-side router handles them.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Health check endpoint for Traefik and Docker HEALTHCHECK ──────────────
    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ── Immutable static assets (Vite/webpack content-hashed filenames) ───────
    location ~* \.(js|css|woff2?|ttf|otf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── HTML: always revalidate (the entrypoint may change on deploy) ─────────
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-store";
    }

    # ── Security ──────────────────────────────────────────────────────────────
    # Traefik's secure-headers middleware handles most headers.
    # These are the nginx-level additions (content policy, framing).
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Silence nginx version in error pages
    server_tokens off;

    # Gzip — Traefik's compress middleware handles brotli; nginx handles gzip
    # for responses that bypass Traefik (direct access, debugging).
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;
}
